name: New skill
description: Propose an agent workflow that should become a SKILL.md skill.
title: "[skill] "
labels: ["type:skill", "status:proposed"]
body:
  - type: markdown
    attributes:
      value: |
        Skill issues are lightweight proposals. They answer whether this workflow deserves a reusable skill.

        The exact `SKILL.md` instructions, activation metadata, tool dependencies, and tests are reviewed in a pull request.
  - type: textarea
    id: workflow
    attributes:
      label: What workflow should this skill enable?
      description: Describe the repeatable agent behavior in plain language.
      placeholder: Help users reconcile Excel bookkeeping sheets and produce balance reports.
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Example user prompt
      description: Write one realistic prompt that should activate this skill.
      placeholder: "Reconcile this ledger and tell me which accounts are out of balance."
    validations:
      required: true
  - type: input
    id: tool_dependency
    attributes:
      label: Known tool dependency
      description: Existing tool, proposed tool issue, or "unknown".
      placeholder: microsoft-365
    validations:
      required: false
  - type: textarea
    id: behavior
    attributes:
      label: What should the skill know how to do?
      description: Summarize the expected behavior. Do not write the full SKILL.md here.
      placeholder: |
        - Read ledger-style spreadsheets
        - Identify mismatched debit and credit entries
        - Produce a concise reconciliation report
    validations:
      required: true
  - type: textarea
    id: activation
    attributes:
      label: When should it activate?
      description: Explain the user situations or plain-language keywords. Regexes belong in the PR, not the issue.
      placeholder: When users ask about bookkeeping, ledger reconciliation, trial balances, or debit/credit errors.
    validations:
      required: true
  - type: input
    id: credit
    attributes:
      label: Credit (optional)
      description: Name or handle if you want attribution.
      placeholder: "@yourhandle"
    validations:
      required: false
