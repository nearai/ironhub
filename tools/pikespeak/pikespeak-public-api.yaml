                      properties:
                        usdPrice:
                          type: number
                      required:
                        - usdPrice
                  complete:
                    const: false
                  warnings:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          const: PARTIAL_BALANCE_DATA
                        scope:
                          const: token_balances
                        message:
                          const: Some token balances are temporarily unavailable.
                        retryable:
                          const: true
                      required:
                        - code
                        - scope
                        - message
                        - retryable
                      additionalProperties: false
                required:
                  - balancesDetails
                  - totalUsd
                  - balancesTotal
