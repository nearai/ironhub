name: New tool
description: Propose a service or API that IronHub should expose as a WASM tool.
title: "[tool] "
labels: ["type:tool", "status:proposed"]
body:
  - type: markdown
    attributes:
      value: |
        Tool issues are lightweight proposals. They answer whether the tool should exist.

        The exact action surface, scopes, limits, README, capabilities file, and Rust implementation are reviewed in a pull request.
  - type: input
    id: service
    attributes:
      label: What service or API should this wrap?
      description: Name the external product, API, protocol, or platform.
      placeholder: Linear
    validations:
      required: true
  - type: textarea
    id: user_tasks
    attributes:
      label: What should users be able to do with it?
      description: List 2-3 concrete user tasks. Do not worry about exact action names.
      placeholder: |
        - Search and list active issues by assignee or status
        - Create and assign new engineering tasks
        - Read project and team-level metrics
    validations:
      required: true
  - type: dropdown
    id: auth
    attributes:
      label: Auth or account requirement
      description: Pick the closest known option.
      options:
        - I do not know
        - OAuth user account
        - Static API token
        - Static webhook URL
        - No auth
    validations:
      required: true
  - type: input
    id: reference
    attributes:
      label: Docs or reference link
      description: API docs, SDK docs, product docs, or another useful reference.
      placeholder: https://...
    validations:
      required: false
  - type: textarea
    id: depends_on
    attributes:
      label: Which workflow or use case needs this?
      description: Link a use-case issue if one exists, or describe the workflow.
      placeholder: Needed for agents that create and update engineering tickets from meeting notes.
    validations:
      required: true
  - type: input
    id: credit
    attributes:
      label: Credit (optional)
      description: Name or handle if you want attribution.
      placeholder: "@yourhandle"
    validations:
      required: false
