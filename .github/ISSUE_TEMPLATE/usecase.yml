name: Suggest a use case
description: Propose a real task an IronClaw agent should help with.
title: "[usecase] "
labels: ["status:proposed"]
body:
  - type: markdown
    attributes:
      value: |
        Use case issues are lightweight proposals. They help maintainers decide whether the task belongs in IronHub.

        Published use cases live in `use-cases/<slug>/USE_CASE.md` and are added through pull requests after review.
  - type: textarea
    id: task
    attributes:
      label: What should the agent do?
      description: Describe the task in plain language. Keep it concrete.
      placeholder: Watch my free trials and warn me before they charge.
    validations:
      required: true
  - type: textarea
    id: prompt
    attributes:
      label: Example user prompt
      description: Write one realistic prompt a user would type.
      placeholder: "trial: Netflix, 14 days. Remind me before it charges."
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Why is this useful?
      description: Who benefits, and what pain does it solve?
      placeholder: People forget free trials and get charged. The agent remembers and alerts them at the right time.
    validations:
      required: true
  - type: textarea
    id: integrations
    attributes:
      label: Known integrations
      description: List obvious tools, APIs, accounts, or services if you know them. It is fine to write "unknown".
      placeholder: |
        - memory
        - time
        - Telegram message sender
    validations:
      required: false
  - type: checkboxes
    id: categories
    attributes:
      label: Categories
      description: Pick all that apply.
      options:
        - label: Personal assistant
        - label: Web 3 / Crypto
        - label: Coding / dev workflow
        - label: Research
        - label: Marketing / content
        - label: Business ops
        - label: Sales / CRM
        - label: Files / knowledge
        - label: Automation
        - label: Design / media
        - label: Skill creation
    validations:
      required: true
