name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-use-cases:
    name: Validate use cases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Validate use case templates
        run: node scripts/validate-use-cases.mjs

  enumerate:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.list.outputs.tools }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: list
        run: |
          tools=$(find tools -mindepth 1 -maxdepth 1 -type d | sort | jq -R . | jq -s -c .)
          echo "tools=$tools" >> "$GITHUB_OUTPUT"

  build:
    needs: enumerate
    name: ${{ matrix.crate }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: ${{ fromJson(needs.enumerate.outputs.tools) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: wasm32-wasip2
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ${{ matrix.crate }}

      - name: Format check
        working-directory: ${{ matrix.crate }}
        run: cargo fmt --check

      - name: Clippy (wasm target)
        working-directory: ${{ matrix.crate }}
        run: cargo clippy --target wasm32-wasip2 --release -- -D warnings

      - name: Clippy (tests)
        working-directory: ${{ matrix.crate }}
        run: cargo clippy --tests --release -- -D warnings

      - name: Tests
        working-directory: ${{ matrix.crate }}
        run: cargo test

      - name: Build wasm component
        working-directory: ${{ matrix.crate }}
        run: cargo build --release --target wasm32-wasip2

  web:
    name: Web (typecheck + lockfile)
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/ironhub
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter web db:generate

      - name: Typecheck
        run: pnpm --filter web typecheck
